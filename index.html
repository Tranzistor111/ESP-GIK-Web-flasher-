<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP-GIK FLESHER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">ESP-GIK FLESHER</h1>
        
        <div id="connectScreen">
            <button class="btn-connect" id="connectBtn">CONNECT</button>
        </div>
        
        <div id="flashScreen" style="display: none;">
            <div class="file-list" id="fileList"></div>
            <button class="btn-flash" id="flashBtn">FLASH</button>
            
            <div class="progress-container" id="progressContainer" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
                <div class="progress-details" id="progressDetails"></div>
            </div>
        </div>
        
        <div class="status" id="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
